#set( $target = "resolve#eid($goal.id)")
#set($value = $mediaarchive.getCachedData("projectstatus",$goal.projectstatus))
<div id="$target" class="d-flex flex-column align-items-end">
	#if($value)
		<div class="badge text-bg-secondary mb-2">#text($value)</div>
	#end
	
	<a href="${communitylink}/users/tasks/resolvegoal.html?goalid=$goal.id" 
		data-targetdiv="$target" 
		data-oemaxlevel="1"
		title="[[Resolve Goal]]"
		class="ajax btn btn-sm btn-success">
		<i class="fas fa-check-circle me-1"></i> [[Resolve Goal]]
	</a>
</div>
